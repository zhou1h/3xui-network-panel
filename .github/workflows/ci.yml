name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.3']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, mbstring, sqlite3
          coverage: none
      - name: Validate Composer files
        run: composer validate --no-check-publish
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: Lint PHP
        run: find . -path ./vendor -prune -o -name '*.php' -print0 | xargs -0 -n1 php -l
      - name: Run smoke tests
        run: php tests/smoke.php
      - name: Check shell scripts
        run: bash -n deploy.sh install.sh update.sh uninstall.sh
      - name: Verify random management paths
        run: bash tests/deploy-path.sh
